<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RoastRemote - Fresh Coffee Delivered for Your Remote Workday</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* Reset and base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #FFFFFF;
      color: #0F172A;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      background-image: linear-gradient(135deg, #7C3AED 0%, #EC4899 50%, #F97316 100%);
    }

    main {
      background: #FFFFFFDD;
      backdrop-filter: blur(18px);
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      max-width: 520px;
      width: 100%;
      padding: 2.5rem 2rem 3rem;
      text-align: center;
      color: #0F172A;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 2.75rem;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #7C3AED, #EC4899, #F97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      font-weight: 600;
      color: #64748B;
      margin-bottom: 2rem;
      font-size: 1.125rem;
      line-height: 1.4;
    }

    form {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2.25rem;
    }

    input[type="email"] {
      flex: 1 1 250px;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      border: 2px solid #E2E8F0;
      border-radius: 12px;
      transition: border-color 0.3s ease;
    }

    input[type="email"]:focus {
      border-color: #EC4899;
      outline: none;
      box-shadow: 0 0 8px rgba(236,72,153,0.5);
    }

    button[type="submit"] {
      background: linear-gradient(90deg, #7C3AED, #EC4899, #F97316);
      border: none;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      color: white;
      padding: 0 1.75rem;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.25s ease;
      flex-shrink: 0;
      min-height: 44px;
    }

    button[type="submit"]:hover,
    button[type="submit"]:focus {
      background: linear-gradient(90deg, #F97316, #EC4899, #7C3AED);
      outline: none;
    }

    .trust-signals {
      font-weight: 600;
      font-size: 0.875rem;
      color: #475569;
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      border-top: 1px solid #E2E8F0;
      padding-top: 1.25rem;
    }

    .trust-signals div {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .trust-icon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      background: linear-gradient(90deg, #7C3AED, #EC4899, #F97316);
      display: inline-block;
    }

    .thank-you-message {
      color: #10B981;
      margin-top: 1rem;
      font-weight: 600;
      font-size: 1rem;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }

      form {
        flex-direction: column;
      }

      button[type="submit"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Fresh for Your Monday Morning Ritual</h1>
    <p class="subtitle">Small-batch organic coffee delivered weekly to fuel your highest-performance remote workdays.</p>
    <form id="waitlist-form">
      <input type="email" name="email" id="email" placeholder="Enter your email address" required aria-label="Email address for waitlist" />
      <button type="submit">Join the Waitlist</button>
    </form>
    <div class="trust-signals">
      <div><span class="trust-icon"></span>100% Organic & Single-Origin</div>
      <div><span class="trust-icon"></span>Small-Batch Roasted Weekly</div>
      <div><span class="trust-icon"></span>Letterbox-Friendly Packaging</div>
    </div>
    <p class="thank-you-message" id="thankyou" style="display:none;">Thanks — we'll be in touch soon!</p>
  </main>

  <script>
    const form = document.getElementById('waitlist-form');
    const thankYouMessage = document.getElementById('thankyou');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = form.email.value.trim();
      if (!email) return;

      buttonDisabled(true);

      try {
        const response = await fetch('https://app.baget.ai/api/public/databases/8664fdc7-4174-41e3-b211-a85e25e7fa99/rows', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: { email } }),
        });

        if (response.ok) {
          form.style.display = 'none';
          thankYouMessage.style.display = 'block';
        } else {
          alert('Failed to join waitlist, please try again.');
          buttonDisabled(false);
        }
      } catch {
        alert('Failed to join waitlist, please try again.');
        buttonDisabled(false);
      }
    });

    function buttonDisabled(state) {
      const submitBtn = form.querySelector('button[type=submit]');
      submitBtn.disabled = state;
      if (state) {
        submitBtn.textContent = 'Submitting...';
      } else {
        submitBtn.textContent = 'Join the Waitlist';
      }
    }
  </script>
</body>
</html>
